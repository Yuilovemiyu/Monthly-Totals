<!DOCTYPE html>
<html>
<head>
  <title>Monthly Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    body { font-family: Arial; padding: 15px; }
    table { border-collapse: collapse; width:100%; }
    th, td { border:1px solid #000; padding:6px; text-align:center; font-size:12px; }
  </style>
</head>

<!-- BONUS MODAL -->
<div id="bonusModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:999;">
  
  <div style="width:90%; height:90%; background:white; margin:2% auto; padding:10px; border-radius:10px; display:flex; flex-direction:column;">
    
    <header style="display:flex; justify-content:space-between; align-items:center;">
      <h3>💰 Bonus Calculator</h3>
      <button onclick="closeBonus()">Close</button>
    </header>

    <iframe 
      src="https://yuilovemiyu.github.io/Bonus-Calculator/"
      style="flex:1; border:none;">
    </iframe>

  </div>

</div>

<body>

<h2>📊 Monthly Totals</h2>

<button onclick="openBonus()">💰 Open Bonus Calculator</button>

<table id="monthlyTotals"></table>


<script>

function openBonus(){
  document.getElementById("bonusModal").style.display = "block";
}

function closeBonus(){
  document.getElementById("bonusModal").style.display = "none";
}

firebase.initializeApp({
  apiKey: "AIzaSyADXlQJcV5KJXTfYBK5qscv7gd88-XNlKo",
  authDomain: "today-s-reporter-3dceb.firebaseapp.com",
  projectId: "today-s-reporter-3dceb"
});

const db = firebase.firestore();

db.collection("monthly_totals")
.onSnapshot(snapshot=>{

  monthlyTotals.innerHTML = `
    <tr>
      <th>Month</th><th>Store</th>
      <th>Total</th><th>Signed</th>
      <th>Rejected</th><th>Cancelled</th>
    </tr>
  `;

  let grouped = {};

  snapshot.forEach(doc=>{
    const d = doc.data();
    if(!grouped[d.month]) grouped[d.month]=[];
    grouped[d.month].push(d);
  });

  Object.keys(grouped).sort().forEach(month=>{

    let t=0,s=0,r=0,c=0;

    monthlyTotals.innerHTML += `
      <tr style="background:#ddd;font-weight:bold">
        <td colspan="6">${month}</td>
      </tr>
    `;

    grouped[month].forEach(d=>{
      t+=d.total; s+=d.signed; r+=d.rejected; c+=d.cancelled;

      monthlyTotals.innerHTML += `
        <tr>
          <td>${d.month}</td>
          <td>${d.store}</td>
          <td>${d.total}</td>
          <td>${d.signed}</td>
          <td>${d.rejected}</td>
          <td>${d.cancelled}</td>
        </tr>
      `;
    });

    monthlyTotals.innerHTML += `
      <tr style="font-weight:bold;background:#f2f2f2">
        <td colspan="2">${month} TOTAL</td>
        <td>${t}</td>
        <td>${s}</td>
        <td>${r}</td>
        <td>${c}</td>
      </tr>
    `;
  });

});



</script>

</body>
</html>
